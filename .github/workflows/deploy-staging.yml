name: Deploy Staging

on:
  workflow_dispatch:
    inputs:
      ref:
        description: Git ref to deploy to staging
        required: true
        default: main

concurrency:
  group: staging
  cancel-in-progress: false

jobs:
  staging-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.12.0

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint backend
        run: pnpm --dir backend run lint

      - name: Build frontend
        run: pnpm run build:frontend

      - name: Verify staging deploy secrets
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        run: pnpm run env:verify -- --environment staging --services frontend

      - name: Print staging environment summary
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
          BACKEND_STAGING_DEPLOY_HOOK_URL: ${{ secrets.BACKEND_STAGING_DEPLOY_HOOK_URL }}
        run: pnpm run env:summary -- --environment staging --services frontend,backend

      - name: Deploy staging frontend
        id: deploy_staging
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
          BACKEND_STAGING_DEPLOY_HOOK_URL: ${{ secrets.BACKEND_STAGING_DEPLOY_HOOK_URL }}
        run: pnpm run deploy:staging

      - name: Publish deployment summary
        run: |
          {
            echo "## Staging Deployment"
            echo
            echo "- Git ref: ${{ inputs.ref }}"
            echo "- Frontend URL: ${{ steps.deploy_staging.outputs.frontend_url }}"
            echo "- Backend hook triggered: ${{ steps.deploy_staging.outputs.backend_triggered }}"
          } >> "$GITHUB_STEP_SUMMARY"
